<form class="my-form">
  <div class="my-form__line">
    <label class="my-form__label" for="name">Name</label>
    <input class="my-form__inp" name="name" id="name" [(ngModel)]="user.name" />
  </div>
  <div class="my-form__line">
    <label class="my-form__label" for="age">Age</label>
    <input class="my-form__inp" name="age" id="age" [(ngModel)]="user.age" />
  </div>
</form>
