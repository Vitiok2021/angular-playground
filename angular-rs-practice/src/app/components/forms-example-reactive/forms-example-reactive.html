<form class="my-form" [formGroup]="user">
  <div class="my-form__line">
    <label class="my-form__label" for="name">Name</label>
    <input class="my-form__inp" name="name" id="name" formControlName="name" />
  </div>
  <div class="my-form__line">
    <label class="my-form__label" for="age">Age</label>
    <input class="my-form__inp" name="age" id="age" formControlName="age" />
  </div>
  <h2 class="my-form__title">Contact info</h2>
  <div class="my-form__block" formArrayName="phones">
    @for (phone of phones.controls; track $index) {
      <div formGroupName="{{ $index }}">
        <div class="my-form__line">
          <label class="my-form__label" for="type">Type</label>
          <select name="type" id="type" formControlName="type">
            <option value="home">Home</option>
            <option value="work">Work</option>
          </select>
        </div>
        <div class="my-form__line">
          <label class="my-form__label" for="number">Number</label>
          <input class="my-form__inp" name="number" id="number" formControlName="number" />
        </div>
      </div>
    }
  </div>
  <button (click)="addPhone()">AddPhone</button>
</form>
