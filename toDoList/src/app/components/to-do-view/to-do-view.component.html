<div class="container">
  <h2>My To-Do List</h2>

  <div class="input-group">
    <input type="text" [(ngModel)]="task" placeholder="Що плануємо зробити?" />
    <button class="btn-add" (click)="addTaskView(task)">Add</button>
  </div>

  <ul class="list-tasks">
    @for (item of tasks; track item.id) {
      <li class="task-item">
        <app-to-do-item
          [toDoItem]="item"
          (delBtn)="delTaskView($event)"
          (togChk)="toggleIsDoneView($event)"
        ></app-to-do-item>
      </li>
    }
  </ul>
  <div class="actions">
    <button
      [class.active-btn]="toDoService.currentFilter === 'all'"
      (click)="changeFilter('all')"
    >
      All
    </button>
    <button (click)="changeFilter('active')">Active</button>
    <button (click)="changeFilter('completed')">Completed</button>
  </div>
  <div class="count-tasks">
    <p class="active-task">Активних задач: {{ toDoService.activeCount }}</p>
  </div>
</div>
