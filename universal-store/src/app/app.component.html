<div class="wrapper">
  <app-header></app-header>
  <main class="main">
    <app-hero></app-hero>
    <section class="catalog">
      <div class="catalog__container">
        <div class="catalog__grid">
          @for (product of fishingProducts | async; track product.id) {
            <app-product-card [prodCard]="product"></app-product-card>
          }
        </div>
      </div>
    </section>
    <router-outlet />
  </main>
  <app-footer></app-footer>
</div>
