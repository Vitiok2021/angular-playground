<form class="login-container" (ngSubmit)="onSubmit()">
  <h2>Вхід в Адмінку</h2>
  <input [(ngModel)]="userName" type="text" placeholder="Логін" name="name" />
  <input
    [(ngModel)]="userPassword"
    type="password"
    placeholder="Пароль"
    name="pass"
  />
  <button>Увійти</button>
</form>
