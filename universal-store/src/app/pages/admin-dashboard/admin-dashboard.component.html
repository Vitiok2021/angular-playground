<form [formGroup]="dashboardForm" (ngSubmit)="onAdd()">
  <div class="form-line">
    <label for="title">Назва товару</label>
    <input type="text" id="title" formControlName="title" />
  </div>
  <div class="form-line">
    <label for="price">Ціна товару</label>
    <input type="number" id="price" formControlName="price" />
  </div>
  <div class="form-line">
    <label for="image">Картинка товару</label>
    <input type="text" id="image" formControlName="image" />
  </div>
  <div class="form-line">
    <label for="images">Додаткові картинки</label>
    <input
      type="text"
      id="images"
      formControlName="images"
      placeholder="url1, url2..."
    />
  </div>
  <div class="form-descr" formGroupName="details">
    <div class="form-line">
      <label for="descr">Опис товару</label>
      <textarea id="descr" formControlName="description"></textarea>
    </div>
    <div class="form-line">
      <label for="manufacturer">Виробник товару</label>
      <input type="text" id="manufacturer" formControlName="manufacturer" />
    </div>
    <div class="form-line">
      <label for="length">Довжина</label>
      <input type="text" id="length" formControlName="length" />
    </div>
    <div class="form-line">
      <label for="weight">Вага товару</label>
      <input type="text" id="weight" formControlName="weight" />
    </div>
    <div class="form-line">
      <label for="color">Колір</label>
      <input type="text" id="color" formControlName="color" />
    </div>
    <div class="form-line">
      <label for="packSize">Кількість</label>
      <input type="text" id="packSize" formControlName="packSize" />
    </div>
  </div>
  <div class="form-line">
    <button [disabled]="!dashboardForm.valid">Add</button>
  </div>
</form>
